<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Proposal Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .confetti-piece {
        position: absolute;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        animation: confetti-fall 3.5s linear infinite;
        opacity: 0.9;
      }
      @keyframes confetti-fall {
        0% {
          transform: translate3d(0, -10px, 0) rotate(0deg);
          opacity: 1;
        }
        100% {
          transform: translate3d(0, 110vh, 0) rotate(360deg);
          opacity: 0;
        }
      }
      .heart-beat {
        animation: heart-beat 1.5s ease-in-out infinite;
      }
      @keyframes heart-beat {
        0%, 100% {
          transform: scale(1);
        }
        25% {
          transform: scale(1.2);
        }
      }
    </style>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  </head>
  <body class="min-h-screen bg-gradient-to-br from-pink-100 to-red-200 flex items-center justify-center p-4 overflow-hidden">
    <div id="root" class="w-full"></div>

    <script type="text/javascript">
      const { useState, useEffect, useRef } = React;

      const photos = ["../photos.jpg", "../photos.jpg", "../photos.jpg"];
      const STORAGE_KEY = "memoryPhoto";
      const fullText = `My love, from the moment you entered my life, everything changed.
You brought happiness, peace, and endless love into my world.
Every moment with you feels magical, and I can't imagine my life without you. ❤️`;

      function ProposalCard() {
        const [response, setResponse] = useState(null);
        const [photoIndex, setPhotoIndex] = useState(0);
        const [typedText, setTypedText] = useState("");
        const [customPhoto, setCustomPhoto] = useState(null);
        const audioRef = useRef(null);
        const successRef = useRef(null);

        useEffect(() => {
          const interval = setInterval(() => {
            setPhotoIndex((prev) => (prev + 1) % photos.length);
          }, 2500);
          return () => clearInterval(interval);
        }, []);

        useEffect(() => {
          let i = 0;
          const typing = setInterval(() => {
            setTypedText(fullText.slice(0, i));
            i += 1;
            if (i > fullText.length) clearInterval(typing);
          }, 40);
          return () => clearInterval(typing);
        }, []);

        useEffect(() => {
          const saved = window.localStorage.getItem(STORAGE_KEY);
          if (saved) {
            setCustomPhoto(saved);
          }
        }, []);

        const handleYes = () => {
          setResponse("yes");
          if (audioRef.current) {
            audioRef.current.currentTime = 0;
            const playPromise = audioRef.current.play();
            if (playPromise && typeof playPromise.catch === "function") {
              playPromise.catch(() => {});
            }
          }
        };

        const handlePhotoChange = (event) => {
          const file = event.target.files && event.target.files[0];
          if (!file) return;
          const reader = new FileReader();
          reader.onload = () => {
            const url = reader.result;
            setCustomPhoto(url);
            setPhotoIndex(0);
            window.localStorage.setItem(STORAGE_KEY, url);
          };
          reader.readAsDataURL(file);
        };

        useEffect(() => {
          if (response === "yes" && successRef.current) {
            successRef.current.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        }, [response]);

        const handleNoHover = (event) => {
          const btn = event.currentTarget;
          const offset = 140;
          const randomTop = Math.random() * offset;
          const randomLeft = Math.random() * offset;
          btn.style.position = "absolute";
          btn.style.top = `${randomTop}px`;
          btn.style.left = `${randomLeft}px`;
        };

        const colors = ["#ec4899", "#f97316", "#f59e0b", "#22c55e", "#3b82f6", "#a855f7"];
        const confettiPieces = Array.from({ length: 28 }, (_, i) => i);
        const currentPhoto = customPhoto || photos[photoIndex];

        return (
          React.createElement("div", { className: "min-h-screen flex items-center justify-center" },
            React.createElement("div", { className: "relative w-full max-w-md" },
              response === "yes" && (
                React.createElement("div", { className: "absolute inset-0 pointer-events-none overflow-hidden" },
                  confettiPieces.map((piece) =>
                    React.createElement("span", {
                      key: piece,
                      className: "confetti-piece",
                      style: {
                        left: `${Math.random() * 100}%`,
                        backgroundColor: colors[piece % colors.length],
                        animationDelay: `${Math.random()}s`,
                        animationDuration: `${3 + Math.random() * 1.5}s`,
                      },
                    })
                  )
                )
              ),
              React.createElement("audio", { ref: audioRef, loop: true },
                React.createElement("source", { src: "../music.mp3", type: "audio/mpeg" })
              ),
              React.createElement("div", { className: "rounded-2xl shadow-xl bg-white/70 backdrop-blur p-6 text-center space-y-4" },
                React.createElement("div", { className: "flex justify-center" },
                  React.createElement("label", {
                    className: "cursor-pointer text-sm text-pink-600 hover:text-pink-700 font-semibold",
                  },
                    "Choose a memory photo",
                    React.createElement("input", {
                      type: "file",
                      accept: "image/*",
                      className: "hidden",
                      onChange: handlePhotoChange,
                    })
                  )
                ),
                React.createElement("img", {
                  key: currentPhoto,
                  src: currentPhoto,
                  alt: "memory",
                  className: "w-32 h-32 rounded-full mx-auto object-cover shadow-md transition-opacity duration-500",
                }),
                React.createElement("div", { className: "heart-beat w-12 h-12 mx-auto text-red-500 mt-1" }, "❤"),
                React.createElement("h1", { className: "text-2xl font-bold text-gray-800" }, "To My Love ❤️"),
                React.createElement("p", { className: "text-gray-700 min-h-[90px] whitespace-pre-line leading-relaxed" },
                  typedText,
                  React.createElement("span", { className: "animate-pulse" }, "|")
                ),
                React.createElement("p", { className: "text-lg font-semibold text-gray-800 mt-1" }, "Will you stay with me forever? 💍"),
                !response && (
                  React.createElement("div", { className: "flex justify-center gap-4 pt-1 relative" },
                    React.createElement("button", {
                      className: "bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-lg shadow",
                      onClick: handleYes,
                    }, "Yes 💖"),
                    React.createElement("button", {
                      className: "bg-red-500 hover:bg-red-600 text-white px-5 py-2 rounded-lg shadow relative",
                      onMouseEnter: handleNoHover,
                    }, "No 😜")
                  )
                ),
                response === "yes" && (
                  React.createElement("div", { className: "text-center space-y-3", ref: successRef },
                    React.createElement("div", { className: "text-4xl animate-spin" }, "💍"),
                    React.createElement("div", { className: "text-green-600 font-semibold text-lg" }, "Yayyy!! 💕 You made me the happiest person alive ❤️")
                  )
                )
              )
            )
          )
        );
      }

      const rootElement = document.getElementById("root");
      ReactDOM.createRoot(rootElement).render(React.createElement(ProposalCard));
    </script>
  </body>
</html>
